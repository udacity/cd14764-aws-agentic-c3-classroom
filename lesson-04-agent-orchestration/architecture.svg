<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow4">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Lesson 4: Agent Orchestration</text>
  <text x="360" y="52" text-anchor="middle" font-size="12" fill="#64748b">Sequential, parallel, and conditional phases orchestrated together</text>

  <!-- Input -->
  <rect x="240" y="70" width="240" height="44" rx="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="360" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">New Employee Request</text>

  <!-- Arrow down -->
  <line x1="360" y1="114" x2="360" y2="148" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- PHASE 1: SEQUENTIAL -->
  <rect x="100" y="150" width="520" height="8" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="115" y="168" font-size="11" font-weight="700" fill="#92400e">PHASE 1: SEQUENTIAL (must succeed in order)</text>

  <!-- Arrow down -->
  <line x1="360" y1="168" x2="360" y2="195" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- IdentityAgent -->
  <rect x="150" y="197" width="200" height="66" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="250" y="223" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">IdentityAgent</text>
  <text x="250" y="241" text-anchor="middle" font-size="10" fill="#3b82f6">Creates account</text>
  <text x="250" y="255" text-anchor="middle" font-size="10" fill="#3b82f6">(username, password)</text>

  <!-- Arrow down -->
  <line x1="250" y1="263" x2="250" y2="297" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- EquipmentAgent -->
  <rect x="370" y="299" width="200" height="66" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="470" y="325" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">EquipmentAgent</text>
  <text x="470" y="343" text-anchor="middle" font-size="10" fill="#3b82f6">Provisions laptop</text>
  <text x="470" y="357" text-anchor="middle" font-size="10" fill="#3b82f6">(hardware, OS setup)</text>

  <!-- Connect the two in sequence -->
  <line x1="250" y1="263" x2="250" y2="280" stroke="#475569" stroke-width="1.5"/>
  <line x1="250" y1="280" x2="370" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="470" y1="280" x2="470" y2="299" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- Arrow down from Phase 1 -->
  <line x1="360" y1="365" x2="360" y2="400" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- PHASE 2: PARALLEL -->
  <rect x="100" y="402" width="520" height="8" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="115" y="420" font-size="11" font-weight="700" fill="#166534">PHASE 2: PARALLEL (independent tasks)</text>

  <!-- Arrow down -->
  <line x1="360" y1="420" x2="360" y2="447" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- TrainingAgent -->
  <rect x="100" y="449" width="220" height="66" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="210" y="475" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">TrainingAgent</text>
  <text x="210" y="493" text-anchor="middle" font-size="10" fill="#3b82f6">Assigns courses</text>
  <text x="210" y="507" text-anchor="middle" font-size="10" fill="#3b82f6">(onboarding path)</text>

  <!-- BuddyAgent -->
  <rect x="400" y="449" width="220" height="66" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="510" y="475" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">BuddyAgent</text>
  <text x="510" y="493" text-anchor="middle" font-size="10" fill="#3b82f6">Assigns mentor</text>
  <text x="510" y="507" text-anchor="middle" font-size="10" fill="#3b82f6">(peer support)</text>

  <!-- Parallel lines from top -->
  <line x1="360" y1="420" x2="210" y2="420" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="210" y1="420" x2="210" y2="449" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="360" y1="420" x2="510" y2="420" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="510" y1="420" x2="510" y2="449" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- Converge from parallel -->
  <line x1="210" y1="515" x2="210" y2="540" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="510" y1="515" x2="510" y2="540" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="210" y1="540" x2="360" y2="540" stroke="#475569" stroke-width="1.5"/>
  <line x1="360" y1="540" x2="510" y2="540" stroke="#475569" stroke-width="1.5"/>
  <circle cx="360" cy="540" r="4" fill="#475569"/>
  <text x="360" y="557" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="600">Wait for all</text>

  <!-- Arrow down to Phase 3 -->
  <line x1="360" y1="557" x2="360" y2="592" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- PHASE 3: CONDITIONAL -->
  <rect x="100" y="594" width="520" height="8" rx="4" fill="#a855f7" opacity="0.3"/>
  <text x="115" y="612" font-size="11" font-weight="700" fill="#7e22ce">PHASE 3: CONDITIONAL (only if needed)</text>

  <!-- Arrow down -->
  <line x1="360" y1="612" x2="360" y2="639" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- AccessAgent -->
  <rect x="225" y="641" width="270" height="66" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="360" y="667" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">AccessAgent</text>
  <text x="360" y="685" text-anchor="middle" font-size="10" fill="#3b82f6">Grants system access (if role requires)</text>

  <!-- Arrow to output -->
  <line x1="360" y1="707" x2="360" y2="742" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- Output -->
  <rect x="245" y="744" width="230" height="36" rx="18" fill="#fae8ff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="360" y="767" text-anchor="middle" font-size="12" font-weight="600" fill="#7e22ce">Onboarding Complete</text>

  <!-- Legend -->
  <rect x="15" y="708" width="10" height="10" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="30" y="717" font-size="10" fill="#64748b">Agent</text>
  <rect x="75" y="708" width="10" height="10" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="90" y="717" font-size="10" fill="#64748b">Input</text>
  <rect x="125" y="708" width="10" height="10" rx="2" fill="#fae8ff" stroke="#a855f7" stroke-width="1"/>
  <text x="140" y="717" font-size="10" fill="#64748b">Output</text>
</svg>