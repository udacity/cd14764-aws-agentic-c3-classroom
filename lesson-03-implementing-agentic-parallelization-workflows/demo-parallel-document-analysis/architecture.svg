  <rect x="50" y="133" width="620" height="170" rx="10" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="65" y="151" font-size="10" font-weight="700" fill="#0891b2">ThreadPoolExecutor (max_workers=3)</text>
