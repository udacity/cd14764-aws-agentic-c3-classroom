AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Lesson 6 Demo: Ride-Sharing Trip Management
  Creates the DynamoDB table for shared trip state with optimistic locking.

Parameters:
  ProjectName:
    Type: String
    Default: lesson-06-shared-state

Resources:
  TripStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ProjectName}-trip-state
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: trip_id
          AttributeType: S
      KeySchema:
        - AttributeName: trip_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

Outputs:
  TripStateTableName:
    Value: !Ref TripStateTable
    Export:
      Name: !Sub ${ProjectName}-TripStateTable
