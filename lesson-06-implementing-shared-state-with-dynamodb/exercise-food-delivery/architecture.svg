<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 700" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow6" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow6">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- White background for dark mode compatibility -->
  <rect width="100%" height="100%" fill="white" rx="8"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Exercise 6: Food Delivery State</text>
  <text x="360" y="52" text-anchor="middle" font-size="12" fill="#64748b">Shared state with optimistic locking via DynamoDB</text>

  <!-- Input -->
  <rect x="260" y="75" width="200" height="44" rx="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow6)"/>
  <text x="360" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Customer Order</text>

  <!-- Arrow down -->
  <line x1="360" y1="119" x2="360" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow6)"/>

  <!-- Shared State -->
  <rect x="150" y="157" width="420" height="90" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow6)"/>
  <text x="360" y="182" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Shared State (DynamoDB)</text>
  <text x="360" y="202" text-anchor="middle" font-size="10" fill="#22c55e">order_id (PK) | version | restaurant | driver</text>
  <text x="360" y="218" text-anchor="middle" font-size="10" fill="#22c55e">total_price | status</text>
  <text x="360" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Optimistic Locking: version-based</text>

  <!-- Arrow down -->
  <line x1="360" y1="247" x2="360" y2="285" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow6)"/>

  <!-- Worker Agents -->
  <g>
    <!-- Restaurant Agent -->
    <rect x="50" y="287" width="140" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow6)"/>
    <text x="120" y="315" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Restaurant</text>
    <text x="120" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Confirm Agent</text>
    <text x="120" y="353" text-anchor="middle" font-size="9" fill="#64748b">Validate order</text>

    <!-- Driver Agent -->
    <rect x="210" y="287" width="140" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow6)"/>
    <text x="280" y="312" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Driver Assign</text>
    <text x="280" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Agent</text>
    <text x="280" y="353" text-anchor="middle" font-size="9" fill="#64748b">Assign driver</text>

    <!-- Price Calculator Agent -->
    <rect x="370" y="287" width="140" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow6)"/>
    <text x="440" y="305" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Price</text>
    <text x="440" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Calculator</text>
    <text x="440" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Agent</text>
    <text x="440" y="353" text-anchor="middle" font-size="9" fill="#64748b">Calculate total</text>

    <!-- Status Tracker Agent -->
    <rect x="530" y="287" width="140" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow6)"/>
    <text x="600" y="312" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Status Tracker</text>
    <text x="600" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Agent</text>
    <text x="600" y="353" text-anchor="middle" font-size="9" fill="#64748b">Track status</text>
  </g>

  <!-- Arrows from agents down -->
  <line x1="120" y1="367" x2="120" y2="405" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <line x1="280" y1="367" x2="280" y2="405" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <line x1="440" y1="367" x2="440" y2="405" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <line x1="600" y1="367" x2="600" y2="405" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow6)"/>

  <!-- Cross-Session Memory -->
  <rect x="150" y="407" width="420" height="70" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" filter="url(#shadow6)"/>
  <text x="360" y="435" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">Cross-Session Memory (AgentCore)</text>
  <text x="360" y="455" text-anchor="middle" font-size="10" fill="#64748b">Persistent state across agent invocations</text>

  <!-- Arrow down -->
  <line x1="360" y1="477" x2="360" y2="515" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow6)"/>

  <!-- Output -->
  <rect x="230" y="517" width="260" height="50" rx="8" fill="#fae8ff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow6)"/>
  <text x="360" y="540" text-anchor="middle" font-size="13" font-weight="600" fill="#7e22ce">Order Confirmation</text>
  <text x="360" y="557" text-anchor="middle" font-size="10" fill="#64748b">with all agent updates</text>

  <!-- Legend -->
  <rect x="15" y="665" width="10" height="10" rx="2" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="30" y="674" font-size="10" fill="#64748b">Coordinator</text>
  <rect x="125" y="665" width="10" height="10" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="674" font-size="10" fill="#64748b">Worker Agent</text>
  <rect x="250" y="665" width="10" height="10" rx="2" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="265" y="674" font-size="10" fill="#64748b">Infrastructure</text>
  <rect x="380" y="665" width="10" height="10" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="395" y="674" font-size="10" fill="#64748b">Input</text>
  <rect x="445" y="665" width="10" height="10" rx="2" fill="#fae8ff" stroke="#a855f7" stroke-width="1"/>
  <text x="460" y="674" font-size="10" fill="#64748b">Output</text>
</svg>
