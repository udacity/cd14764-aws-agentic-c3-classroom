AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Lesson 6: Implementing Shared State with DynamoDB
  Creates DynamoDB tables for trip state (demo) and order state (exercise).

Parameters:
  ProjectName:
    Type: String
    Default: lesson-06-shared-state

Resources:
  TripStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ProjectName}-trip-state
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: trip_id
          AttributeType: S
      KeySchema:
        - AttributeName: trip_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  OrderStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ProjectName}-order-state
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: order_id
          AttributeType: S
      KeySchema:
        - AttributeName: order_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

Outputs:
  TripStateTableName:
    Value: !Ref TripStateTable
    Export:
      Name: !Sub ${ProjectName}-TripStateTable
  OrderStateTableName:
    Value: !Ref OrderStateTable
    Export:
      Name: !Sub ${ProjectName}-OrderStateTable
