<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 700" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow1">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- White background for dark mode compatibility -->
  <rect width="100%" height="100%" fill="white" rx="8"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Lesson 1: Multi-Agent Healthcare Triage</text>
  <text x="360" y="52" text-anchor="middle" font-size="12" fill="#64748b">3-agent coordinator pattern with sequential handoff</text>

  <!-- Input -->
  <rect x="260" y="75" width="200" height="44" rx="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="360" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Patient Complaint</text>

  <!-- Arrow down -->
  <line x1="360" y1="119" x2="360" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- Coordinator -->
  <rect x="230" y="157" width="260" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" filter="url(#shadow1)"/>
  <text x="360" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#4338ca">Coordinator</text>
  <text x="360" y="197" text-anchor="middle" font-size="10" fill="#6366f1">Orchestrates 3 worker agents in sequence</text>

  <!-- Arrow down -->
  <line x1="360" y1="207" x2="360" y2="245" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- Agent 1: Symptom Analyzer -->
  <rect x="210" y="247" width="300" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="360" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Agent 1: Symptom Analyzer</text>
  <text x="360" y="292" text-anchor="middle" font-size="11" fill="#3b82f6">Tool: lookup_symptoms()</text>
  <text x="360" y="307" text-anchor="middle" font-size="10" fill="#64748b">complaint text → matched conditions + severity</text>

  <!-- Arrow down with label -->
  <line x1="360" y1="317" x2="360" y2="360" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <text x="380" y="343" font-size="10" fill="#64748b">symptom JSON</text>

  <!-- Agent 2: Urgency Classifier -->
  <rect x="210" y="362" width="300" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="360" y="387" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Agent 2: Urgency Classifier</text>
  <text x="360" y="407" text-anchor="middle" font-size="11" fill="#3b82f6">Tool: classify_urgency()</text>
  <text x="360" y="422" text-anchor="middle" font-size="10" fill="#64748b">severity levels → urgent / standard / routine</text>

  <!-- Arrow down with label -->
  <line x1="360" y1="432" x2="360" y2="475" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <text x="380" y="458" font-size="10" fill="#64748b">urgency level</text>

  <!-- Agent 3: Appointment Scheduler -->
  <rect x="210" y="477" width="300" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="360" y="502" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Agent 3: Appointment Scheduler</text>
  <text x="360" y="522" text-anchor="middle" font-size="11" fill="#3b82f6">Tool: book_appointment()</text>
  <text x="360" y="537" text-anchor="middle" font-size="10" fill="#64748b">urgency level → time slot + instructions</text>

  <!-- Arrow down -->
  <line x1="360" y1="547" x2="360" y2="585" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- Output -->
  <rect x="245" y="587" width="230" height="44" rx="22" fill="#fae8ff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="360" y="614" text-anchor="middle" font-size="13" font-weight="600" fill="#7e22ce">Triage Result</text>

  <!-- Legend -->
  <rect x="15" y="665" width="10" height="10" rx="2" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="30" y="674" font-size="10" fill="#64748b">Coordinator</text>
  <rect x="115" y="665" width="10" height="10" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="130" y="674" font-size="10" fill="#64748b">Worker Agent</text>
  <rect x="225" y="665" width="10" height="10" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="240" y="674" font-size="10" fill="#64748b">Input</text>
  <rect x="290" y="665" width="10" height="10" rx="2" fill="#fae8ff" stroke="#a855f7" stroke-width="1"/>
  <text x="305" y="674" font-size="10" fill="#64748b">Output</text>
</svg>
