<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 700" xmlns="http://www.w3.org/2000/svg" font-family='system-ui, -apple-system, "Segoe UI", sans-serif'>
  <defs>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
    <marker id="a" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0.5 L9,4 L0,7.5" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="700" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="360" y="35" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">Lesson 8: Multi-Agent RAG Research Assistant</text>
  <text x="360" y="56" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">Parallel KB retrieval  →  aggregation  →  grounded synthesis</text>

  <!-- Research Query pill -->
  <rect x="250" y="68" width="220" height="42" rx="21" fill="#059669" filter="url(#sh)"/>
  <text x="360" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="white">Research Query</text>

  <!-- Arrow down -->
  <line x1="360" y1="112" x2="360" y2="138" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="374" y="128" font-size="11" fill="#e2e8f0">query</text>

  <!-- ── Parallel Retrieval container ── -->
  <rect x="28" y="142" width="664" height="202" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2.5"/>
  <text x="360" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#0e7490">ThreadPoolExecutor  —  Parallel Retrieval  (max_workers=2)</text>

  <!-- CS Retriever Agent -->
  <rect x="48" y="172" width="304" height="58" rx="8" fill="#1d4ed8" filter="url(#sh)"/>
  <text x="200" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="white">CS Retriever Agent</text>
  <text x="200" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">Nova Lite  |  retrieve_cs_papers()</text>

  <!-- CS KB box -->
  <rect x="48" y="240" width="304" height="36" rx="6" fill="#b45309" filter="url(#sh)"/>
  <text x="200" y="263" text-anchor="middle" font-size="13" font-weight="700" fill="white">Bedrock KB: CS Papers</text>

  <!-- Bio Retriever Agent -->
  <rect x="368" y="172" width="304" height="58" rx="8" fill="#1d4ed8" filter="url(#sh)"/>
  <text x="520" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="white">Bio Retriever Agent</text>
  <text x="520" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">Nova Lite  |  retrieve_bio_papers()</text>

  <!-- Bio KB box -->
  <rect x="368" y="240" width="304" height="36" rx="6" fill="#b45309" filter="url(#sh)"/>
  <text x="520" y="263" text-anchor="middle" font-size="13" font-weight="700" fill="white">Bedrock KB: Biology Papers</text>

  <!-- Arrows from retrievers down -->
  <line x1="200" y1="344" x2="320" y2="370" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>
  <text x="195" y="362" text-anchor="end" font-size="11" fill="#e2e8f0">CS passages</text>
  <line x1="520" y1="344" x2="400" y2="370" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>
  <text x="525" y="362" text-anchor="start" font-size="11" fill="#e2e8f0">Bio passages</text>

  <!-- Aggregation box -->
  <rect x="100" y="374" width="520" height="54" rx="8" fill="#1e40af" filter="url(#sh)"/>
  <text x="360" y="397" text-anchor="middle" font-size="14" font-weight="700" fill="white">Aggregation + Deduplication</text>
  <text x="360" y="418" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">Rank by relevance score  |  Select top-K</text>

  <!-- Arrow down -->
  <line x1="360" y1="430" x2="360" y2="454" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="374" y="445" font-size="11" fill="#e2e8f0">ranked top-K</text>

  <!-- Synthesis Agent -->
  <rect x="100" y="458" width="520" height="58" rx="8" fill="#1d4ed8" filter="url(#sh)"/>
  <text x="360" y="481" text-anchor="middle" font-size="14" font-weight="700" fill="white">Synthesis Agent</text>
  <text x="360" y="502" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">Nova Pro  |  temp 0.2  |  Grounded [DOC_ID] citations</text>

  <!-- Arrow down -->
  <line x1="360" y1="518" x2="360" y2="542" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="374" y="533" font-size="11" fill="#e2e8f0">cited summary</text>

  <!-- Result pill -->
  <rect x="178" y="546" width="364" height="44" rx="22" fill="#059669" filter="url(#sh)"/>
  <text x="360" y="573" text-anchor="middle" font-size="14" font-weight="700" fill="white">Grounded Research Summary</text>

  <!-- Graceful degradation note -->
  <rect x="78" y="606" width="564" height="40" rx="8" fill="#b45309" filter="url(#sh)"/>
  <text x="360" y="622" text-anchor="middle" font-size="12" font-weight="700" fill="white">⚡  Graceful Degradation</text>
  <text x="360" y="638" text-anchor="middle" font-size="11" font-weight="600" fill="white">If one KB fails, synthesis uses partial results with confidence disclaimer</text>

  <!-- Legend -->
  <rect x="136" y="664" width="14" height="14" rx="3" fill="#0891b2"/>
  <text x="155" y="676" font-size="12" fill="#cbd5e1">Parallel</text>
  <rect x="226" y="664" width="14" height="14" rx="3" fill="#1d4ed8"/>
  <text x="245" y="676" font-size="12" fill="#cbd5e1">Agent</text>
  <rect x="302" y="664" width="14" height="14" rx="3" fill="#b45309"/>
  <text x="321" y="676" font-size="12" fill="#cbd5e1">KB</text>
  <rect x="352" y="664" width="14" height="14" rx="3" fill="#1e40af"/>
  <text x="371" y="676" font-size="12" fill="#cbd5e1">Aggregation</text>
  <rect x="468" y="664" width="14" height="14" rx="3" fill="#059669"/>
  <text x="487" y="676" font-size="12" fill="#cbd5e1">Output</text>
</svg>
