<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg" font-family='system-ui, -apple-system, "Segoe UI", sans-serif'>
  <defs>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
    <marker id="a" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0.5 L9,4 L0,7.5" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="720" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="360" y="35" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">Exercise 8: Clinical Literature RAG</text>
  <text x="360" y="56" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">Parallel retrieval  +  deduplication  +  structured clinical output</text>

  <!-- Clinical Query pill -->
  <rect x="250" y="68" width="220" height="42" rx="21" fill="#059669" filter="url(#sh)"/>
  <text x="360" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="white">Clinical Query</text>

  <!-- Arrow down -->
  <line x1="360" y1="112" x2="360" y2="138" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="374" y="128" font-size="11" fill="#e2e8f0">query</text>

  <!-- ── Parallel Retrieval container ── -->
  <rect x="28" y="142" width="664" height="212" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2.5"/>
  <text x="360" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#0e7490">ThreadPoolExecutor  —  Parallel Retrieval  (max_workers=2)</text>

  <!-- Drug Interaction Retriever -->
  <rect x="48" y="172" width="304" height="58" rx="8" fill="#1d4ed8" filter="url(#sh)"/>
  <text x="200" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="white">Drug Interaction Retriever</text>
  <text x="200" y="216" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd">Nova Lite  |  retrieve_drug_interactions()</text>

  <!-- Drug KB box -->
  <rect x="48" y="240" width="304" height="36" rx="6" fill="#b45309" filter="url(#sh)"/>
  <text x="200" y="263" text-anchor="middle" font-size="13" font-weight="700" fill="white">Bedrock KB: Drug Interactions</text>

  <!-- Clinical Guidelines Retriever -->
  <rect x="368" y="172" width="304" height="58" rx="8" fill="#1d4ed8" filter="url(#sh)"/>
  <text x="520" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="white">Guidelines Retriever</text>
  <text x="520" y="216" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd">Nova Lite  |  retrieve_guidelines()</text>

  <!-- Guidelines KB box -->
  <rect x="368" y="240" width="304" height="36" rx="6" fill="#b45309" filter="url(#sh)"/>
  <text x="520" y="263" text-anchor="middle" font-size="13" font-weight="700" fill="white">Bedrock KB: Clinical Guidelines</text>

  <!-- NEW badge on deduplication -->
  <rect x="282" y="285" width="196" height="24" rx="12" fill="#7c3aed"/>
  <text x="380" y="302" text-anchor="middle" font-size="11" font-weight="700" fill="white">✦ NEW: Deduplication pass</text>

  <!-- Arrows from retrievers down -->
  <line x1="200" y1="354" x2="320" y2="382" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>
  <text x="190" y="372" text-anchor="end" font-size="11" fill="#e2e8f0">drug passages</text>
  <line x1="520" y1="354" x2="400" y2="382" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>
  <text x="530" y="372" text-anchor="start" font-size="11" fill="#e2e8f0">guideline passages</text>

  <!-- Aggregation + Dedup box -->
  <rect x="100" y="386" width="520" height="54" rx="8" fill="#1e40af" filter="url(#sh)"/>
  <text x="360" y="409" text-anchor="middle" font-size="14" font-weight="700" fill="white">Aggregation + Deduplication  ✦ NEW</text>
  <text x="360" y="430" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">Remove near-duplicates  |  Rank by score  |  Top-K</text>

  <!-- Arrow down -->
  <line x1="360" y1="442" x2="360" y2="466" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="374" y="457" font-size="11" fill="#e2e8f0">deduped top-K</text>

  <!-- Synthesis Agent -->
  <rect x="100" y="470" width="520" height="72" rx="8" fill="#1d4ed8" filter="url(#sh)"/>
  <text x="360" y="493" text-anchor="middle" font-size="14" font-weight="700" fill="white">Synthesis Agent  ✦ Structured Output</text>
  <text x="360" y="513" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">Drug Interactions  |  Guidelines  |  Integrated Recommendation</text>
  <text x="360" y="532" text-anchor="middle" font-size="11" fill="#bfdbfe">Nova Pro  |  temp 0.1  |  Citations required</text>

  <!-- Arrow down -->
  <line x1="360" y1="544" x2="360" y2="568" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="374" y="559" font-size="11" fill="#e2e8f0">clinical report</text>

  <!-- Result pill -->
  <rect x="178" y="572" width="364" height="44" rx="22" fill="#059669" filter="url(#sh)"/>
  <text x="360" y="599" text-anchor="middle" font-size="14" font-weight="700" fill="white">Clinical Literature Report</text>

  <!-- Graceful degradation note -->
  <rect x="78" y="630" width="564" height="40" rx="8" fill="#b45309" filter="url(#sh)"/>
  <text x="360" y="646" text-anchor="middle" font-size="12" font-weight="700" fill="white">⚡  Graceful Degradation  ✦ NEW</text>
  <text x="360" y="662" text-anchor="middle" font-size="11" font-weight="600" fill="white">If one KB fails, partial results returned with confidence disclaimer</text>

  <!-- Legend -->
  <rect x="110" y="688" width="14" height="14" rx="3" fill="#0891b2"/>
  <text x="129" y="700" font-size="12" fill="#cbd5e1">Parallel</text>
  <rect x="200" y="688" width="14" height="14" rx="3" fill="#1d4ed8"/>
  <text x="219" y="700" font-size="12" fill="#cbd5e1">Agent</text>
  <rect x="274" y="688" width="14" height="14" rx="3" fill="#b45309"/>
  <text x="293" y="700" font-size="12" fill="#cbd5e1">KB</text>
  <rect x="326" y="688" width="14" height="14" rx="3" fill="#1e40af"/>
  <text x="345" y="700" font-size="12" fill="#cbd5e1">Aggregation</text>
  <rect x="454" y="688" width="14" height="14" rx="3" fill="#7c3aed"/>
  <text x="473" y="700" font-size="12" fill="#cbd5e1">New in exercise</text>
</svg>
