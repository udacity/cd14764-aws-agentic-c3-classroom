<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 820 760" xmlns="http://www.w3.org/2000/svg"
     role="img" font-family='system-ui, -apple-system, "Segoe UI", sans-serif'>
  <title>Exercise 8: Clinical Literature RAG — deduplication, structured output, graceful degradation</title>
  <desc>Clinical query flows into two parallel retrievers. A failure path shows graceful degradation when the Drug KB fails. Normal path passes through deduplication and aggregation into a structured synthesis agent producing three mandatory output sections.</desc>

  <defs>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.30"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 8" refX="9" refY="4"
            markerWidth="7" markerHeight="6" orient="auto">
      <path d="M0,1 L8.5,4 L0,7" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 8" refX="9" refY="4"
            markerWidth="7" markerHeight="6" orient="auto">
      <path d="M0,1 L8.5,4 L0,7" fill="none" stroke="#ef4444" stroke-width="1.6" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-grn" viewBox="0 0 10 8" refX="9" refY="4"
            markerWidth="7" markerHeight="6" orient="auto">
      <path d="M0,1 L8.5,4 L0,7" fill="none" stroke="#22c55e" stroke-width="1.6" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="760" rx="14" fill="#0f172a"/>

  <!-- ── Title ── -->
  <text x="410" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#f1f5f9">Exercise 8: Clinical Literature RAG</text>
  <text x="410" y="52" text-anchor="middle" font-size="12" fill="#64748b">
    Deduplication ✦ NEW  ·  Structured Output ✦ NEW  ·  Graceful Degradation ✦ NEW
  </text>

  <!-- ── Clinical Query pill ── -->
  <rect x="305" y="66" width="210" height="40" rx="20" fill="#059669" filter="url(#sh)"/>
  <text x="410" y="91" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Clinical Query</text>

  <!-- query → parallel box -->
  <line x1="410" y1="108" x2="410" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══ Parallel Retrieval container ══ -->
  <rect x="28" y="134" width="764" height="204" rx="10"
        fill="none" stroke="#0891b2" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="410" y="154" text-anchor="middle" font-size="12" font-weight="700" fill="#0891b2">
    ThreadPoolExecutor — Parallel Retrieval (max_workers=2)
  </text>

  <!-- Drug Retriever -->
  <rect x="48" y="162" width="330" height="56" rx="8" fill="#1d4ed8" filter="url(#sh)"/>
  <text x="213" y="186" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Drug Interactions Retriever</text>
  <text x="213" y="206" text-anchor="middle" font-size="11" fill="#93c5fd">Nova Lite  ·  retrieve_drug_interactions()</text>

  <!-- Drug KB -->
  <rect x="48" y="230" width="330" height="38" rx="6" fill="#92400e" filter="url(#sh)"/>
  <text x="213" y="254" text-anchor="middle" font-size="13" font-weight="700" fill="#fef3c7">Bedrock KB: Drug Interactions</text>
  <text x="213" y="270" text-anchor="middle" font-size="10" fill="#fde68a">bedrock-agent-runtime.retrieve()</text>

  <!-- FAILURE badge on Drug side -->
  <rect x="98" y="282" width="230" height="22" rx="11" fill="#dc2626"/>
  <text x="213" y="297" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">⚡ Query 3: simulate_failure=True</text>

  <!-- Guidelines Retriever -->
  <rect x="442" y="162" width="330" height="56" rx="8" fill="#1d4ed8" filter="url(#sh)"/>
  <text x="607" y="186" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Guidelines Retriever</text>
  <text x="607" y="206" text-anchor="middle" font-size="11" fill="#93c5fd">Nova Lite  ·  retrieve_guidelines()</text>

  <!-- Guidelines KB -->
  <rect x="442" y="230" width="330" height="38" rx="6" fill="#92400e" filter="url(#sh)"/>
  <text x="607" y="254" text-anchor="middle" font-size="13" font-weight="700" fill="#fef3c7">Bedrock KB: Clinical Guidelines</text>
  <text x="607" y="270" text-anchor="middle" font-size="10" fill="#fde68a">bedrock-agent-runtime.retrieve()</text>

  <!-- ── Normal path arrows (converging) ── -->
  <line x1="213" y1="340" x2="350" y2="376" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="196" y="364" text-anchor="end" font-size="10" fill="#94a3b8">drug passages</text>
  <line x1="607" y1="340" x2="470" y2="376" stroke="#64748b" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="623" y="364" font-size="10" fill="#94a3b8">guideline passages</text>

  <!-- ── Failure path arrow (left side, dashed red) ── -->
  <line x1="120" y1="340" x2="52" y2="410" stroke="#ef4444" stroke-width="1.6"
        stroke-dasharray="5 3" marker-end="url(#arr-red)"/>
  <text x="44" y="400" text-anchor="end" font-size="10" fill="#ef4444">Drug=0</text>
  <text x="44" y="412" text-anchor="end" font-size="10" fill="#ef4444">passages</text>

  <!-- PARTIAL flag badge (left of dedup box) -->
  <rect x="18" y="416" width="100" height="30" rx="6" fill="#7f1d1d"/>
  <text x="68" y="430" text-anchor="middle" font-size="10" font-weight="700" fill="#fca5a5">PARTIAL</text>
  <text x="68" y="442" text-anchor="middle" font-size="9" fill="#fca5a5">flag set</text>

  <!-- ── Deduplication ✦ NEW ── -->
  <rect x="130" y="380" width="560" height="52" rx="8" fill="#5b21b6" filter="url(#sh)"/>
  <text x="410" y="402" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">
    Deduplication  ✦ NEW
  </text>
  <text x="410" y="420" text-anchor="middle" font-size="11" fill="#c4b5fd">
    Hash first-100 chars per passage  ·  Keep higher-score copy  ·  Drop near-duplicates
  </text>

  <!-- dedup → aggregation -->
  <line x1="410" y1="434" x2="410" y2="456" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="424" y="448" font-size="10" fill="#94a3b8">deduped passages</text>

  <!-- ── Aggregation & Ranking ── -->
  <rect x="130" y="460" width="560" height="52" rx="8" fill="#1e3a8a" filter="url(#sh)"/>
  <text x="410" y="482" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Aggregation &amp; Ranking</text>
  <text x="410" y="500" text-anchor="middle" font-size="11" fill="#93c5fd">Sort by relevance score  ·  Top-K = 10  (vs. 5 in demo)</text>

  <!-- aggregation → synthesis -->
  <line x1="410" y1="514" x2="410" y2="536" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="424" y="528" font-size="10" fill="#94a3b8">ranked top-10 passages</text>

  <!-- ── Synthesis Agent ── -->
  <rect x="80" y="540" width="660" height="78" rx="8" fill="#1d4ed8" filter="url(#sh)"/>
  <text x="410" y="560" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">
    Synthesis Agent  ✦ Structured Output NEW
  </text>
  <text x="410" y="578" text-anchor="middle" font-size="11" fill="#93c5fd">
    Nova Pro  ·  temp 0.1  ·  Citations required
  </text>
  <!-- Three mandatory sections shown as pills inside box -->
  <rect x="98" y="586" width="178" height="22" rx="5" fill="#1e40af"/>
  <text x="187" y="601" text-anchor="middle" font-size="10" font-weight="700" fill="#bfdbfe">① Drug Interactions</text>
  <rect x="311" y="586" width="198" height="22" rx="5" fill="#1e40af"/>
  <text x="410" y="601" text-anchor="middle" font-size="10" font-weight="700" fill="#bfdbfe">② Clinical Guidelines</text>
  <rect x="524" y="586" width="206" height="22" rx="5" fill="#1e40af"/>
  <text x="627" y="601" text-anchor="middle" font-size="10" font-weight="700" fill="#bfdbfe">③ Integrated Recommendation</text>

  <!-- synthesis → two output paths -->
  <!-- Normal path arrow (right side) -->
  <line x1="560" y1="620" x2="620" y2="648" stroke="#22c55e" stroke-width="1.8" marker-end="url(#arr-grn)"/>
  <text x="625" y="648" font-size="10" fill="#22c55e">full data</text>

  <!-- Partial path arrow (left side) -->
  <line x1="260" y1="620" x2="200" y2="648" stroke="#ef4444" stroke-width="1.6"
        stroke-dasharray="5 3" marker-end="url(#arr-red)"/>
  <text x="194" y="648" text-anchor="end" font-size="10" fill="#ef4444">partial data</text>

  <!-- Normal output -->
  <rect x="530" y="652" width="240" height="40" rx="20" fill="#059669" filter="url(#sh)"/>
  <text x="650" y="677" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Clinical Report</text>

  <!-- Partial output -->
  <rect x="50" y="652" width="240" height="40" rx="20" fill="#7f1d1d" filter="url(#sh)"/>
  <text x="170" y="669" text-anchor="middle" font-size="12" font-weight="700" fill="#fca5a5">Clinical Report + PARTIAL</text>
  <text x="170" y="684" text-anchor="middle" font-size="10" fill="#fca5a5">disclaimer in section ③</text>

  <!-- Graceful Degradation label ✦ NEW -->
  <rect x="18" y="706" width="280" height="22" rx="6" fill="#7f1d1d"/>
  <text x="158" y="721" text-anchor="middle" font-size="11" font-weight="700" fill="#fca5a5">⚡ Graceful Degradation  ✦ NEW</text>

  <!-- ── Legend ── -->
  <rect x="380" y="708" width="12" height="12" rx="2" fill="#5b21b6"/>
  <text x="397" y="719" font-size="11" fill="#94a3b8">Dedup (NEW)</text>
  <rect x="494" y="708" width="12" height="12" rx="2" fill="#1e3a8a"/>
  <text x="511" y="719" font-size="11" fill="#94a3b8">Aggregation</text>
  <rect x="604" y="708" width="12" height="12" rx="2" fill="#dc2626"/>
  <text x="621" y="719" font-size="11" fill="#94a3b8">Failure path</text>
  <rect x="704" y="708" width="12" height="12" rx="2" fill="#059669"/>
  <text x="721" y="719" font-size="11" fill="#94a3b8">Output</text>
</svg>
