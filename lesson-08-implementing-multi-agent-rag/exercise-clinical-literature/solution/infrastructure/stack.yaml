AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Lesson 8 Exercise: Multi-Agent RAG for Clinical Literature
  Creates the S3 source bucket that holds documents for the Drug Interactions
  and Clinical Guidelines Knowledge Bases.
  NOTE: Bedrock Knowledge Bases must be created manually in the AWS Console.

Parameters:
  ProjectName:
    Type: String
    Default: lesson-08-exercise-rag

Resources:
  KBSourceBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-kb-sources-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

Outputs:
  KBSourceBucketName:
    Value: !Ref KBSourceBucket
    Export:
      Name: !Sub ${ProjectName}-KBSourceBucket
