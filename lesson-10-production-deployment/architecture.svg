<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow10" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow10" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="35" font-size="18" font-weight="bold" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e1e1e">
    Lesson 10: Production Deployment
  </text>
  <text x="360" y="55" font-size="12" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#999999">
    5 Production Components with Deployment Pipeline
  </text>

  <!-- AgentCore Runtime Box (top) -->
  <g filter="url(#shadow10)">
    <rect x="100" y="80" width="520" height="180" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>

    <!-- Title -->
    <text x="360" y="105" font-size="13" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#166534">
      AgentCore Runtime
    </text>

    <!-- Network info -->
    <text x="110" y="130" font-size="11" font-family="'Segoe UI', system-ui, sans-serif" fill="#166534">
      Network: PUBLIC | Protocol: MCP | Guardrail: ENABLED
    </text>

    <!-- Three agents inside -->
    <g filter="url(#shadow10)">
      <rect x="120" y="150" width="140" height="90" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
      <text x="190" y="170" font-size="11" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e40af">
        ClaimsRouter
      </text>
      <text x="190" y="190" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e40af">
        (Nova Lite)
      </text>
      <line x1="125" y1="200" x2="255" y2="200" stroke="#3b82f6" stroke-width="1"/>
      <text x="190" y="218" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e40af">
        Route claims to
      </text>
      <text x="190" y="232" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e40af">
        proper agents
      </text>
    </g>

    <g filter="url(#shadow10)">
      <rect x="290" y="150" width="140" height="90" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
      <text x="360" y="170" font-size="11" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e40af">
        ClaimsAnalyzer
      </text>
      <text x="360" y="190" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e40af">
        (Claude Sonnet)
      </text>
      <line x1="295" y1="200" x2="425" y2="200" stroke="#3b82f6" stroke-width="1"/>
      <text x="360" y="218" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e40af">
        Deep analysis
      </text>
      <text x="360" y="232" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e40af">
        of claims data
      </text>
    </g>

    <g filter="url(#shadow10)">
      <rect x="460" y="150" width="140" height="90" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
      <text x="530" y="170" font-size="11" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e40af">
        ClaimsResponder
      </text>
      <text x="530" y="190" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e40af">
        (Nova Pro)
      </text>
      <line x1="465" y1="200" x2="595" y2="200" stroke="#3b82f6" stroke-width="1"/>
      <text x="530" y="218" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e40af">
        Generate
      </text>
      <text x="530" y="232" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e40af">
        responses
      </text>
    </g>
  </g>

  <!-- Arrow down from runtime -->
  <line x1="360" y1="260" x2="360" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow10)"/>

  <!-- Deployment Pipeline (horizontal chain) -->
  <g>
    <text x="360" y="310" font-size="12" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e1e1e">
      Deployment Pipeline (6 Gated Steps)
    </text>

    <!-- Pipeline boxes -->
    <g filter="url(#shadow10)">
      <rect x="60" y="325" width="75" height="50" rx="3" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
      <text x="97.5" y="355" font-size="10" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#166534">
        Build
      </text>
    </g>

    <line x1="135" y1="350" x2="155" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#arrow10)"/>

    <g filter="url(#shadow10)">
      <rect x="155" y="325" width="75" height="50" rx="3" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
      <text x="192.5" y="355" font-size="10" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#166534">
        Guardrail
      </text>
    </g>

    <line x1="230" y1="350" x2="250" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#arrow10)"/>

    <g filter="url(#shadow10)">
      <rect x="250" y="325" width="75" height="50" rx="3" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
      <text x="287.5" y="355" font-size="10" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#166534">
        Runtime
      </text>
    </g>

    <line x1="325" y1="350" x2="345" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#arrow10)"/>

    <g filter="url(#shadow10)">
      <rect x="345" y="325" width="75" height="50" rx="3" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
      <text x="382.5" y="355" font-size="10" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#166534">
        Memory
      </text>
    </g>

    <line x1="420" y1="350" x2="440" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#arrow10)"/>

    <g filter="url(#shadow10)">
      <rect x="440" y="325" width="95" height="50" rx="3" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
      <text x="487.5" y="355" font-size="10" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#166534">
        Observability
      </text>
    </g>

    <line x1="535" y1="350" x2="555" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#arrow10)"/>

    <g filter="url(#shadow10)">
      <rect x="555" y="325" width="85" height="50" rx="3" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
      <text x="597.5" y="340" font-size="9" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#166534">
        Smoke
      </text>
      <text x="597.5" y="357" font-size="9" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#166534">
        Test
      </text>
    </g>
  </g>

  <!-- Arrow down from pipeline -->
  <line x1="360" y1="375" x2="360" y2="410" stroke="#475569" stroke-width="2" marker-end="url(#arrow10)"/>

  <!-- Monitoring boxes at bottom -->
  <g>
    <!-- CloudWatch -->
    <g filter="url(#shadow10)">
      <rect x="60" y="410" width="170" height="130" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
      <text x="145" y="435" font-size="12" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        CloudWatch
      </text>
      <text x="145" y="455" font-size="11" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        Dashboard
      </text>
      <line x1="70" y1="463" x2="220" y2="463" stroke="#94a3b8" stroke-width="1"/>
      <text x="145" y="483" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        Real-time metrics
      </text>
      <text x="145" y="498" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        Alerts configured
      </text>
      <text x="145" y="513" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        Health status
      </text>
      <text x="145" y="528" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        monitoring
      </text>
    </g>

    <!-- X-Ray Tracing -->
    <g filter="url(#shadow10)">
      <rect x="275" y="410" width="170" height="130" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
      <text x="360" y="435" font-size="12" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        X-Ray Tracing
      </text>
      <line x1="285" y1="443" x2="435" y2="443" stroke="#94a3b8" stroke-width="1"/>
      <text x="360" y="463" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        Distributed
      </text>
      <text x="360" y="478" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        tracing enabled
      </text>
      <text x="360" y="493" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        5% sampling rate
      </text>
      <text x="360" y="508" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        for all requests
      </text>
      <text x="360" y="523" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        to reduce overhead
      </text>
    </g>

    <!-- Cost Estimation -->
    <g filter="url(#shadow10)">
      <rect x="490" y="410" width="170" height="130" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
      <text x="575" y="435" font-size="12" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        Cost Estimation
      </text>
      <line x1="500" y1="443" x2="650" y2="443" stroke="#94a3b8" stroke-width="1"/>
      <text x="575" y="470" font-size="11" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#166534">
        $1,997/month
      </text>
      <text x="575" y="490" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        Breakdown:
      </text>
      <text x="575" y="505" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        Compute: $1,200
      </text>
      <text x="575" y="520" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
        API calls: $797
      </text>
    </g>
  </g>

  <!-- Legend -->
  <g>
    <text x="20" y="625" font-size="11" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" fill="#1e1e1e">
      Legend:
    </text>
    <rect x="20" y="635" width="12" height="12" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="38" y="644" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" fill="#1e1e1e">
      Agents
    </text>
    <rect x="130" y="635" width="12" height="12" rx="2" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
    <text x="148" y="644" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" fill="#1e1e1e">
      Tools
    </text>
    <rect x="240" y="635" width="12" height="12" rx="2" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
    <text x="258" y="644" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" fill="#1e1e1e">
      Infrastructure
    </text>
  </g>
</svg>
