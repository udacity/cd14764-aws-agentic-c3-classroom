<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 980" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow9" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow9" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="35" font-size="18" font-weight="bold" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e1e1e">
    Lesson 9: Guardrails & Evaluation
  </text>
  <text x="360" y="55" font-size="12" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#999999">
    6-Layer Governance Pipeline
  </text>

  <!-- Layer 0: Patient Input -->
  <g filter="url(#shadow9)">
    <rect x="260" y="80" width="200" height="50" rx="25" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="360" y="110" font-size="13" font-weight="500" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#78350f">
      Patient Input
    </text>
  </g>

  <!-- Arrow down -->
  <line x1="360" y1="130" x2="360" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow9)"/>

  <!-- Layer 1: Kill Switch -->
  <g filter="url(#shadow9)">
    <rect x="200" y="160" width="320" height="60" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="360" y="185" font-size="13" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#991b1b">
      Layer 1: Kill Switch Check
    </text>
    <text x="360" y="210" font-size="11" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#991b1b">
      if triggered → reject immediately
    </text>
  </g>

  <!-- Arrow down -->
  <line x1="360" y1="220" x2="360" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow9)"/>

  <!-- Layer 2: Rate Limiter -->
  <g filter="url(#shadow9)">
    <rect x="200" y="250" width="320" height="60" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="360" y="275" font-size="13" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#991b1b">
      Layer 2: Rate Limiter (Token Bucket)
    </text>
    <text x="360" y="300" font-size="11" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#991b1b">
      100 requests/second max
    </text>
  </g>

  <!-- Arrow down -->
  <line x1="360" y1="310" x2="360" y2="340" stroke="#475569" stroke-width="2" marker-end="url(#arrow9)"/>

  <!-- Layer 3: INPUT Guardrail -->
  <g filter="url(#shadow9)">
    <rect x="160" y="340" width="400" height="140" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="360" y="365" font-size="13" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#991b1b">
      Layer 3: INPUT Guardrail
    </text>
    <text x="360" y="388" font-size="11" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#991b1b">
      4 Security Policies:
    </text>

    <!-- Policy boxes inside -->
    <g filter="url(#shadow9)">
      <rect x="180" y="405" width="85" height="50" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
      <text x="222.5" y="423" font-size="10" font-weight="500" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#78350f">
        Content
      </text>
      <text x="222.5" y="437" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#78350f">
        (violence,
      </text>
      <text x="222.5" y="450" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#78350f">
        self-harm)
      </text>
    </g>

    <g filter="url(#shadow9)">
      <rect x="280" y="405" width="85" height="50" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
      <text x="322.5" y="423" font-size="10" font-weight="500" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#78350f">
        PII
      </text>
      <text x="322.5" y="437" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#78350f">
        (block SSN,
      </text>
      <text x="322.5" y="450" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#78350f">
        anonymize)
      </text>
    </g>

    <g filter="url(#shadow9)">
      <rect x="380" y="405" width="85" height="50" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
      <text x="422.5" y="423" font-size="10" font-weight="500" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#78350f">
        Topic
      </text>
      <text x="422.5" y="437" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#78350f">
        (legal,
      </text>
      <text x="422.5" y="450" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#78350f">
        prescriptions)
      </text>
    </g>

    <g filter="url(#shadow9)">
      <rect x="480" y="405" width="75" height="50" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
      <text x="517.5" y="423" font-size="10" font-weight="500" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#78350f">
        Word
      </text>
      <text x="517.5" y="437" font-size="9" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#78350f">
        (profanity)
      </text>
    </g>
  </g>

  <!-- Arrow down -->
  <line x1="360" y1="480" x2="360" y2="510" stroke="#475569" stroke-width="2" marker-end="url(#arrow9)"/>

  <!-- Layer 4: Healthcare Agent -->
  <g filter="url(#shadow9)">
    <rect x="200" y="510" width="320" height="60" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="360" y="535" font-size="13" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e40af">
      Layer 4: Healthcare Agent
    </text>
    <text x="360" y="560" font-size="11" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#1e40af">
      (Nova Lite)
    </text>
  </g>

  <!-- Arrow down -->
  <line x1="360" y1="570" x2="360" y2="600" stroke="#475569" stroke-width="2" marker-end="url(#arrow9)"/>

  <!-- Layer 5: OUTPUT Guardrail -->
  <g filter="url(#shadow9)">
    <rect x="160" y="600" width="400" height="80" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="360" y="625" font-size="13" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#991b1b">
      Layer 5: OUTPUT Guardrail
    </text>
    <text x="360" y="650" font-size="11" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#991b1b">
      Same 4 policies applied to response
    </text>
    <text x="360" y="670" font-size="11" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#991b1b">
      (prevent sensitive data leakage)
    </text>
  </g>

  <!-- Arrow down -->
  <line x1="360" y1="680" x2="360" y2="710" stroke="#475569" stroke-width="2" marker-end="url(#arrow9)"/>

  <!-- Layer 6: Metrics Dashboard -->
  <g filter="url(#shadow9)">
    <rect x="160" y="710" width="400" height="80" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="360" y="735" font-size="13" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
      Layer 6: Metrics Dashboard
    </text>
    <text x="360" y="755" font-size="11" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
      + Audit Log & Compliance Tracking
    </text>
    <text x="360" y="775" font-size="11" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#475569">
      Monitor guardrail violations & policy hits
    </text>
  </g>

  <!-- Arrow down -->
  <line x1="360" y1="790" x2="360" y2="820" stroke="#475569" stroke-width="2" marker-end="url(#arrow9)"/>

  <!-- Final output -->
  <g filter="url(#shadow9)">
    <rect x="260" y="820" width="200" height="50" rx="25" fill="#fae8ff" stroke="#a855f7" stroke-width="2"/>
    <text x="360" y="850" font-size="13" font-weight="500" font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle" fill="#6b21a8">
      Safe Response
    </text>
  </g>

  <!-- Legend -->
  <g>
    <text x="20" y="925" font-size="11" font-weight="600" font-family="'Segoe UI', system-ui, sans-serif" fill="#1e1e1e">
      Legend:
    </text>
    <rect x="20" y="935" width="12" height="12" rx="2" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
    <text x="38" y="944" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" fill="#1e1e1e">
      Guardrail/Block
    </text>
    <rect x="180" y="935" width="12" height="12" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="198" y="944" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" fill="#1e1e1e">
      Agent
    </text>
    <rect x="280" y="935" width="12" height="12" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="298" y="944" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" fill="#1e1e1e">
      Input/Data
    </text>
    <rect x="420" y="935" width="12" height="12" rx="2" fill="#fae8ff" stroke="#a855f7" stroke-width="1"/>
    <text x="438" y="944" font-size="10" font-family="'Segoe UI', system-ui, sans-serif" fill="#1e1e1e">
      Output
    </text>
  </g>
</svg>
