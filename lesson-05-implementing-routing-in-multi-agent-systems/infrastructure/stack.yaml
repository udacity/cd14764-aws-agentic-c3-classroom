AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Lesson 5: Implementing Routing in Multi-Agent Systems
  Creates a DynamoDB table for routing audit logs and an IAM role for access.

Parameters:
  ProjectName:
    Type: String
    Default: lesson-05-routing

Resources:
  RoutingAuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ProjectName}-routing-audit
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: request_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: request_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  DynamoDBAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-dynamodb-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeTable
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource: !GetAtt RoutingAuditTable.Arn

Outputs:
  RoutingAuditTableName:
    Value: !Ref RoutingAuditTable
    Export:
      Name: !Sub ${ProjectName}-RoutingAuditTable
  DynamoDBAccessRoleArn:
    Value: !GetAtt DynamoDBAccessRole.Arn
    Description: Set DYNAMODB_ROLE_ARN to this value before running the scripts
    Export:
      Name: !Sub ${ProjectName}-DynamoDBAccessRoleArn
