AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Lesson 5: Implementing Routing in Multi-Agent Systems
  Creates a DynamoDB table for routing audit logs.

Parameters:
  ProjectName:
    Type: String
    Default: lesson-05-routing

Resources:
  RoutingAuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ProjectName}-routing-audit
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: request_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: request_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  RoutingAuditPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${ProjectName}-dynamodb-access
      Description: Allow access to the routing audit DynamoDB table
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:DescribeTable
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:Scan
              - dynamodb:Query
            Resource: !GetAtt RoutingAuditTable.Arn
      Roles:
        - voclabs

Outputs:
  RoutingAuditTableName:
    Value: !Ref RoutingAuditTable
    Export:
      Name: !Sub ${ProjectName}-RoutingAuditTable
