  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Lesson 5: Financial Transaction Router</text>
  <text x="360" y="50" text-anchor="middle" font-size="11" fill="#64748b">4-tier hybrid: priority → rules → LLM → fallback</text>
  <rect x="270" y="65" width="180" height="38" rx="19" fill="#10b981" filter="url(#sh)"/>
  <text x="360" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="white">Transaction Request</text>
  <rect x="120" y="133" width="480" height="52" rx="8" fill="#6366f1" filter="url(#sh)"/>
  <text x="360" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="white">Tier 1: PRIORITY</text>
  <text x="360" y="173" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Amount > $10K → SeniorReviewAgent</text>
  <rect x="120" y="215" width="480" height="52" rx="8" fill="#3b82f6" filter="url(#sh)"/>
