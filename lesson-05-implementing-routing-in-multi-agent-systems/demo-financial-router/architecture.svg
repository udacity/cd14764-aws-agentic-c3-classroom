<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 780 720" xmlns="http://www.w3.org/2000/svg" font-family='system-ui, -apple-system, "Segoe UI", sans-serif'>
  <defs>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="a" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0.5 L9,4 L0,7.5" fill="none" stroke="#475569" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0.5 L9,4 L0,7.5" fill="none" stroke="#6366f1" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0.5 L9,4 L0,7.5" fill="none" stroke="#3b82f6" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
    <marker id="ap" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0.5 L9,4 L0,7.5" fill="none" stroke="#8b5cf6" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0.5 L9,4 L0,7.5" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="780" height="720" rx="12" fill="#1e293b"/>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Lesson 5: Financial Transaction Router</text>
  <text x="390" y="50" text-anchor="middle" font-size="11" fill="#cbd5e1">4-tier hybrid: priority &#x2192; rules &#x2192; LLM &#x2192; fallback</text>

  <!-- Transaction Request -->
  <rect x="140" y="65" width="180" height="38" rx="19" fill="#10b981" filter="url(#sh)"/>
  <text x="230" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="white">Transaction Request</text>

  <!-- Vertical flow arrow -->
  <line x1="230" y1="106" x2="230" y2="130" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Tier 1: Priority -->
  <rect x="60" y="133" width="340" height="52" rx="8" fill="#6366f1" filter="url(#sh)"/>
  <text x="230" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="white">Tier 1: PRIORITY</text>
  <text x="230" y="173" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Amount &gt; $10K</text>

  <!-- Arrow: Priority pass-through -->
  <line x1="230" y1="188" x2="230" y2="212" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="244" y="204" font-size="9" fill="#cbd5e1">not priority</text>

  <!-- Arrow: Priority to SeniorReview -->
  <line x1="400" y1="159" x2="620" y2="159" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <rect x="620" y="145" width="140" height="30" rx="6" fill="#6366f1" filter="url(#sh)"/>
  <text x="690" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="white">SeniorReview Agent</text>

  <!-- Tier 2: Rule-Based -->
  <rect x="60" y="215" width="340" height="52" rx="8" fill="#3b82f6" filter="url(#sh)"/>
  <text x="230" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="white">Tier 2: RULE-BASED</text>
  <text x="230" y="255" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Keyword regex matching</text>

  <!-- Arrow: Rule pass-through -->
  <line x1="230" y1="270" x2="230" y2="294" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="244" y="286" font-size="9" fill="#cbd5e1">no match</text>

  <!-- Arrows: Rules to 3 agents -->
  <line x1="400" y1="225" x2="620" y2="225" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ab)"/>
  <rect x="620" y="211" width="140" height="30" rx="6" fill="#3b82f6" filter="url(#sh)"/>
  <text x="690" y="230" text-anchor="middle" font-size="10" font-weight="600" fill="white">Payments Agent</text>

  <line x1="400" y1="241" x2="540" y2="265" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ab)"/>
  <rect x="620" y="253" width="140" height="30" rx="6" fill="#3b82f6" filter="url(#sh)"/>
  <text x="690" y="272" text-anchor="middle" font-size="10" font-weight="600" fill="white">Fraud Agent</text>
  <line x1="540" y1="268" x2="620" y2="268" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>

  <line x1="400" y1="255" x2="540" y2="307" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ab)"/>
  <rect x="620" y="295" width="140" height="30" rx="6" fill="#3b82f6" filter="url(#sh)"/>
  <text x="690" y="314" text-anchor="middle" font-size="10" font-weight="600" fill="white">Account Agent</text>
  <line x1="540" y1="310" x2="620" y2="310" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Labels for rule routing -->
  <text x="480" y="220" font-size="9" fill="#93c5fd">&#x201C;wire&#x201D; &#x201C;transfer&#x201D;</text>
  <text x="480" y="258" font-size="9" fill="#93c5fd">&#x201C;fraud&#x201D; &#x201C;unauthorized&#x201D;</text>
  <text x="480" y="300" font-size="9" fill="#93c5fd">&#x201C;balance&#x201D; &#x201C;statement&#x201D;</text>

  <!-- Tier 3: LLM Classification -->
  <rect x="60" y="297" width="340" height="52" rx="8" fill="#8b5cf6" filter="url(#sh)"/>
  <text x="230" y="319" text-anchor="middle" font-size="12" font-weight="700" fill="white">Tier 3: LLM CLASSIFICATION</text>
  <text x="230" y="337" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Nova Lite classifier (confidence &#x2265; 0.6)</text>

  <!-- Arrow: LLM pass-through -->
  <line x1="230" y1="352" x2="230" y2="376" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="244" y="368" font-size="9" fill="#cbd5e1">low confidence</text>

  <!-- Arrow: LLM to specialist (routes to any of the 3 above) -->
  <line x1="400" y1="323" x2="540" y2="370" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ap)"/>
  <text x="540" y="385" font-size="9" fill="#c4b5fd">Routes to best-match</text>
  <text x="540" y="397" font-size="9" fill="#c4b5fd">specialist above</text>

  <!-- Tier 4: Fallback -->
  <rect x="60" y="379" width="340" height="52" rx="8" fill="#64748b" filter="url(#sh)"/>
  <text x="230" y="401" text-anchor="middle" font-size="12" font-weight="700" fill="white">Tier 4: FALLBACK</text>
  <text x="230" y="419" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Safety net for unclassifiable requests</text>

  <!-- Arrow: Fallback to General -->
  <line x1="400" y1="405" x2="620" y2="405" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ag)"/>
  <rect x="620" y="391" width="140" height="30" rx="6" fill="#64748b" filter="url(#sh)"/>
  <text x="690" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="white">General Agent</text>
  <text x="690" y="430" text-anchor="middle" font-size="9" fill="#94a3b8">+ human review flag</text>

  <!-- All agents arrow down to result -->
  <line x1="690" y1="325" x2="690" y2="460" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="690" y1="460" x2="390" y2="460" stroke="#475569" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#a)"/>

  <!-- Result / Response -->
  <rect x="270" y="450" width="180" height="34" rx="17" fill="#10b981" filter="url(#sh)"/>
  <text x="360" y="471" text-anchor="middle" font-size="11" font-weight="600" fill="white">Agent Response</text>

  <!-- DynamoDB Audit Log -->
  <line x1="360" y1="487" x2="360" y2="515" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="374" y="505" font-size="9" fill="#cbd5e1">log decision</text>
  <rect x="220" y="518" width="320" height="36" rx="6" fill="#f59e0b" filter="url(#sh)"/>
  <text x="380" y="541" text-anchor="middle" font-size="11" font-weight="600" fill="#422006">DynamoDB Audit Log</text>
  <text x="380" y="567" text-anchor="middle" font-size="9" fill="#fbbf24">request_id | method | agent | confidence | latency</text>

  <!-- Legend -->
  <rect x="170" y="595" width="14" height="14" rx="3" fill="#6366f1"/>
  <text x="188" y="606" font-size="10" fill="#e2e8f0">Priority</text>
  <rect x="260" y="595" width="14" height="14" rx="3" fill="#3b82f6"/>
  <text x="278" y="606" font-size="10" fill="#e2e8f0">Rule-Based</text>
  <rect x="370" y="595" width="14" height="14" rx="3" fill="#8b5cf6"/>
  <text x="388" y="606" font-size="10" fill="#e2e8f0">LLM</text>
  <rect x="430" y="595" width="14" height="14" rx="3" fill="#64748b"/>
  <text x="448" y="606" font-size="10" fill="#e2e8f0">Fallback</text>
  <rect x="520" y="595" width="14" height="14" rx="3" fill="#f59e0b"/>
  <text x="538" y="606" font-size="10" fill="#e2e8f0">Infrastructure</text>
</svg>
