<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 820" xmlns="http://www.w3.org/2000/svg" font-family='system-ui, -apple-system, "Segoe UI", sans-serif'>
  <defs>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
    <marker id="a" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0.5 L9,4 L0,7.5" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="820" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="360" y="35" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">Exercise 9: Trading Compliance Guardrails</text>
  <text x="360" y="56" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">Stricter governance for financial services</text>

  <!-- Trading Query pill -->
  <rect x="250" y="68" width="220" height="42" rx="21" fill="#059669" filter="url(#sh)"/>
  <text x="360" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="white">Trading Query</text>

  <!-- Arrow -->
  <line x1="360" y1="112" x2="360" y2="128" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="374" y="122" font-size="11" fill="#e2e8f0">trading query</text>

  <!-- 1. Kill Switch — STRICTER -->
  <rect x="86" y="132" width="548" height="58" rx="8" fill="#b91c1c" filter="url(#sh)"/>
  <text x="360" y="153" text-anchor="middle" font-size="14" font-weight="700" fill="white">① Kill Switch  ✦ Stricter</text>
  <text x="360" y="173" text-anchor="middle" font-size="12" font-weight="600" fill="white">3 violations in 60 seconds → agent disabled  (demo: 5-minute window)</text>

  <line x1="360" y1="192" x2="360" y2="208" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="374" y="202" font-size="11" fill="#e2e8f0">allowed</text>

  <!-- 2. Rate Limiter -->
  <rect x="130" y="212" width="460" height="52" rx="8" fill="#b45309" filter="url(#sh)"/>
  <text x="360" y="234" text-anchor="middle" font-size="14" font-weight="700" fill="white">② Rate Limiter</text>
  <text x="360" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="white">Token bucket: 50 req/sec  |  100 burst  (half of demo)</text>

  <line x1="360" y1="266" x2="360" y2="282" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="374" y="276" font-size="11" fill="#e2e8f0">within limit</text>

  <!-- 3. INPUT Guardrail — VERSIONED -->
  <rect x="46" y="286" width="628" height="90" rx="8" fill="#4338ca" filter="url(#sh)"/>
  <text x="360" y="308" text-anchor="middle" font-size="14" font-weight="700" fill="white">③ INPUT Guardrail  ✦ Versioned  (DRAFT → Version 1)</text>
  <!-- Policy chips -->
  <rect x="66" y="320" width="136" height="34" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="134" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="white">Content</text>
  <rect x="212" y="320" width="136" height="34" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="280" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="white">PII</text>
  <rect x="358" y="320" width="136" height="34" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="426" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="white">Topic</text>
  <rect x="504" y="320" width="136" height="34" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="572" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="white">Word</text>

  <line x1="360" y1="378" x2="360" y2="394" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="374" y="388" font-size="11" fill="#e2e8f0">compliant input</text>

  <!-- 4. Compliance Agent -->
  <rect x="130" y="398" width="460" height="56" rx="8" fill="#1d4ed8" filter="url(#sh)"/>
  <text x="360" y="421" text-anchor="middle" font-size="14" font-weight="700" fill="white">④ Compliance Agent</text>
  <text x="360" y="442" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">Nova Lite  |  check_trading_rules()</text>

  <line x1="360" y1="456" x2="360" y2="472" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="374" y="466" font-size="11" fill="#e2e8f0">agent response</text>

  <!-- 5. OUTPUT Guardrail — NEW -->
  <rect x="86" y="476" width="548" height="52" rx="8" fill="#4338ca" filter="url(#sh)"/>
  <text x="360" y="498" text-anchor="middle" font-size="14" font-weight="700" fill="white">⑤ OUTPUT Guardrail  ✦ NEW</text>
  <text x="360" y="518" text-anchor="middle" font-size="12" font-weight="600" fill="white">Scans agent response for PII leaks  (demo only scanned input)</text>

  <line x1="360" y1="530" x2="360" y2="546" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="374" y="540" font-size="11" fill="#e2e8f0">safe output</text>

  <!-- 6. Model Evaluation -->
  <rect x="130" y="550" width="460" height="46" rx="8" fill="#7c3aed" filter="url(#sh)"/>
  <text x="360" y="578" text-anchor="middle" font-size="14" font-weight="700" fill="white">⑥ Model Evaluation  (LLM-as-Judge: Claude Sonnet)</text>

  <line x1="360" y1="598" x2="360" y2="614" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="374" y="608" font-size="11" fill="#e2e8f0">input + response</text>

  <!-- CloudWatch Dashboard -->
  <rect x="130" y="618" width="460" height="44" rx="8" fill="#b45309" filter="url(#sh)"/>
  <text x="360" y="645" text-anchor="middle" font-size="13" font-weight="700" fill="white">CloudWatch Dashboard + Audit Log</text>

  <line x1="360" y1="664" x2="360" y2="680" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="374" y="674" font-size="11" fill="#e2e8f0">eval scores</text>

  <!-- Compliance Response pill -->
  <rect x="250" y="684" width="220" height="42" rx="21" fill="#059669" filter="url(#sh)"/>
  <text x="360" y="710" text-anchor="middle" font-size="14" font-weight="700" fill="white">Compliance Response</text>

  <!-- Legend -->
  <rect x="110" y="748" width="14" height="14" rx="3" fill="#b91c1c"/>
  <text x="129" y="760" font-size="12" fill="#cbd5e1">Kill Switch</text>
  <rect x="228" y="748" width="14" height="14" rx="3" fill="#4338ca"/>
  <text x="247" y="760" font-size="12" fill="#cbd5e1">Guardrail</text>
  <rect x="336" y="748" width="14" height="14" rx="3" fill="#1d4ed8"/>
  <text x="355" y="760" font-size="12" fill="#cbd5e1">Agent</text>
  <rect x="408" y="748" width="14" height="14" rx="3" fill="#7c3aed"/>
  <text x="427" y="760" font-size="12" fill="#cbd5e1">Evaluation</text>
  <rect x="520" y="748" width="14" height="14" rx="3" fill="#b45309"/>
  <text x="539" y="760" font-size="12" fill="#cbd5e1">Monitoring</text>
  <text x="360" y="790" text-anchor="middle" font-size="11" fill="#64748b">✦ marks concepts new in this exercise vs the demo</text>
</svg>
