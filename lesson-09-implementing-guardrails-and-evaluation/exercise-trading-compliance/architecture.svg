<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 660 620" xmlns="http://www.w3.org/2000/svg" font-family='system-ui, -apple-system, "Segoe UI", sans-serif'>
  <defs>
    <marker id="a" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="6" markerHeight="5" orient="auto">
      <path d="M0,1 L8,4 L0,7" fill="none" stroke="#475569" stroke-width="1.8" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="660" height="620" rx="12" fill="#0f172a"/>

  <text x="330" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">Exercise 9 &#8212; Trading Compliance Governance</text>
  <text x="330" y="48" text-anchor="middle" font-size="11" fill="#64748b">Same pipeline as the demo &#183; 3 new features marked &#10022;</text>

  <rect x="215" y="58" width="230" height="34" rx="17" fill="#059669"/>
  <text x="330" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Trading Query</text>
  <line x1="330" y1="94" x2="330" y2="112" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- Kill Switch STRICTER -->
  <rect x="90" y="116" width="480" height="42" rx="7" fill="#b91c1c"/>
  <text x="295" y="134" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">&#9312; Kill Switch</text>
  <rect x="486" y="120" width="78" height="20" rx="10" fill="#fca5a5"/>
  <text x="525" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">&#10022; Stricter</text>
  <text x="330" y="150" text-anchor="middle" font-size="10" fill="#fca5a5">3 violations in 60 seconds &#8594; disabled (demo: 5-minute window)</text>
  <line x1="330" y1="160" x2="330" y2="178" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- Rate Limiter -->
  <rect x="115" y="182" width="430" height="42" rx="7" fill="#92400e"/>
  <text x="330" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">&#9313; Rate Limiter</text>
  <text x="330" y="216" text-anchor="middle" font-size="10" fill="#fde68a">Token bucket &#183; 50 req/sec &#183; 100 burst (half of demo)</text>
  <line x1="330" y1="226" x2="330" y2="244" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- INPUT Guardrail VERSIONED -->
  <rect x="60" y="248" width="540" height="76" rx="7" fill="#3730a3"/>
  <text x="280" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">&#9314; INPUT Guardrail</text>
  <rect x="430" y="254" width="158" height="20" rx="10" fill="#a5b4fc"/>
  <text x="509" y="268" text-anchor="middle" font-size="10" font-weight="700" fill="#1e1b4b">&#10022; Versioned DRAFT&#8594;v1</text>
  <rect x="76" y="276" width="118" height="36" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="135" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Content</text>
  <text x="135" y="305" text-anchor="middle" font-size="9" fill="#c7d2fe">threats &#183; harm</text>
  <rect x="206" y="276" width="118" height="36" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="265" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">PII</text>
  <text x="265" y="305" text-anchor="middle" font-size="9" fill="#c7d2fe">CC &#183; SSN &#183; ACCT</text>
  <rect x="336" y="276" width="118" height="36" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="395" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Topic</text>
  <text x="395" y="305" text-anchor="middle" font-size="9" fill="#c7d2fe">insider &#183; buy/sell recs</text>
  <rect x="466" y="276" width="118" height="36" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="525" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Word</text>
  <text x="525" y="305" text-anchor="middle" font-size="9" fill="#c7d2fe">profanity</text>
  <line x1="330" y1="326" x2="330" y2="344" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- Agent -->
  <rect x="115" y="348" width="430" height="42" rx="7" fill="#1d4ed8"/>
  <text x="330" y="366" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">&#9315; Compliance Agent</text>
  <text x="330" y="382" text-anchor="middle" font-size="10" fill="#93c5fd">Strands + Nova Lite &#183; check_trading_rules() tool</text>
  <line x1="330" y1="392" x2="330" y2="410" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- OUTPUT Guardrail NEW -->
  <rect x="90" y="414" width="480" height="42" rx="7" fill="#3730a3"/>
  <text x="280" y="432" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">&#9316; OUTPUT Guardrail</text>
  <rect x="452" y="420" width="112" height="20" rx="10" fill="#a5b4fc"/>
  <text x="508" y="434" text-anchor="middle" font-size="10" font-weight="700" fill="#1e1b4b">&#10022; NEW</text>
  <text x="330" y="448" text-anchor="middle" font-size="10" fill="#c7d2fe">Scans agent response for PII leaks before sending to user</text>
  <line x1="330" y1="458" x2="330" y2="476" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- Model Eval -->
  <rect x="115" y="480" width="430" height="42" rx="7" fill="#6d28d9"/>
  <text x="330" y="498" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">&#9317; Model Evaluation (LLM-as-Judge)</text>
  <text x="330" y="514" text-anchor="middle" font-size="10" fill="#ddd6fe">Claude Sonnet &#183; compliance / relevance / safety / completeness</text>
  <line x1="330" y1="524" x2="330" y2="542" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <rect x="215" y="546" width="230" height="34" rx="17" fill="#059669"/>
  <text x="330" y="568" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Compliance Response</text>

  <text x="330" y="602" text-anchor="middle" font-size="10" fill="#64748b">Kill switch triggers at 3rd PII block (input 8) &#183; inputs 9&#8211;15 rejected immediately</text>
</svg>
