<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 700" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow1">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- White background for dark mode compatibility -->
  <rect width="100%" height="100%" fill="white" rx="8"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Exercise 9: Trading Compliance</text>
  <text x="360" y="52" text-anchor="middle" font-size="12" fill="#64748b">Guardrails, evaluation, and safety controls</text>

  <!-- Input -->
  <rect x="260" y="75" width="200" height="44" rx="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="360" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Trading Request</text>

  <!-- Arrow down -->
  <line x1="360" y1="119" x2="360" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- Rate Limiter -->
  <rect x="210" y="157" width="300" height="60" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="360" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Rate Limiter</text>
  <text x="360" y="197" text-anchor="middle" font-size="11" fill="#22c55e">Token Bucket: 100 req/sec sustained, 200 burst</text>
  <text x="360" y="212" text-anchor="middle" font-size="10" fill="#64748b">(if allowed)</text>

  <!-- Arrow down -->
  <line x1="360" y1="217" x2="360" y2="250" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- Input Guardrail -->
  <rect x="210" y="252" width="300" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="360" y="275" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">INPUT Guardrail</text>
  <text x="360" y="292" text-anchor="middle" font-size="11" fill="#ef4444">Bedrock Guardrails API</text>
  <text x="360" y="307" text-anchor="middle" font-size="10" fill="#64748b">Content + Insider Trading + Market Manip (if passed)</text>

  <!-- Arrow down -->
  <line x1="360" y1="312" x2="360" y2="345" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- Trading Compliance Agent -->
  <rect x="210" y="347" width="300" height="65" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="360" y="372" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Trading Compliance Agent</text>
  <text x="360" y="390" text-anchor="middle" font-size="11" fill="#3b82f6">Claude Nova Lite</text>
  <text x="360" y="405" text-anchor="middle" font-size="10" fill="#64748b">Tool: check_compliance()</text>

  <!-- Arrow down -->
  <line x1="360" y1="412" x2="360" y2="447" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- Output Guardrail -->
  <rect x="210" y="449" width="300" height="55" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="360" y="472" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">OUTPUT Guardrail</text>
  <text x="360" y="489" text-anchor="middle" font-size="11" fill="#ef4444">Bedrock Guardrails API</text>

  <!-- Arrow down -->
  <line x1="360" y1="504" x2="360" y2="537" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- Model Evaluation -->
  <rect x="210" y="539" width="300" height="65" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" filter="url(#shadow1)"/>
  <text x="360" y="564" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">Model Evaluation</text>
  <text x="360" y="581" text-anchor="middle" font-size="11" fill="#6366f1">LLM-as-Judge</text>
  <text x="360" y="596" text-anchor="middle" font-size="10" fill="#64748b">Criteria: compliance, relevance, safety</text>

  <!-- Arrow down -->
  <line x1="360" y1="604" x2="360" y2="637" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- CloudWatch & Kill Switch -->
  <rect x="210" y="639" width="300" height="55" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="360" y="662" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">CloudWatch Metrics + Kill Switch</text>
  <text x="360" y="679" text-anchor="middle" font-size="10" fill="#64748b">Threshold: 3 violations → agent disabled</text>
</svg>
