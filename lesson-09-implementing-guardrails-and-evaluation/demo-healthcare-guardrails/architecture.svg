<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 660 560" xmlns="http://www.w3.org/2000/svg" font-family='system-ui, -apple-system, "Segoe UI", sans-serif'>
  <defs>
    <marker id="a" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="6" markerHeight="5" orient="auto">
      <path d="M0,1 L8,4 L0,7" fill="none" stroke="#475569" stroke-width="1.8" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="660" height="560" rx="12" fill="#0f172a"/>

  <text x="330" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">Lesson 9 Demo &#8212; Healthcare Agent Governance</text>
  <text x="330" y="48" text-anchor="middle" font-size="11" fill="#64748b">Every request passes through 5 layers before the patient gets a response</text>

  <rect x="215" y="58" width="230" height="34" rx="17" fill="#059669"/>
  <text x="330" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Patient Input</text>
  <line x1="330" y1="94" x2="330" y2="112" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <rect x="115" y="116" width="430" height="42" rx="7" fill="#b91c1c"/>
  <text x="330" y="134" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">&#9312; Kill Switch</text>
  <text x="330" y="150" text-anchor="middle" font-size="10" fill="#fca5a5">3 violations in 5-minute window &#8594; agent disabled (CloudWatch-backed)</text>
  <line x1="330" y1="160" x2="330" y2="178" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <rect x="115" y="182" width="430" height="42" rx="7" fill="#92400e"/>
  <text x="330" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">&#9313; Rate Limiter</text>
  <text x="330" y="216" text-anchor="middle" font-size="10" fill="#fde68a">Token bucket &#183; 100 req/sec sustained &#183; 200 burst &#183; 429 if exceeded</text>
  <line x1="330" y1="226" x2="330" y2="244" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <rect x="60" y="248" width="540" height="76" rx="7" fill="#3730a3"/>
  <text x="330" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">&#9314; INPUT Guardrail &#183; bedrock-runtime.apply_guardrail()</text>
  <rect x="76" y="276" width="118" height="36" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="135" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Content</text>
  <text x="135" y="305" text-anchor="middle" font-size="9" fill="#c7d2fe">violence &#183; self-harm</text>
  <rect x="206" y="276" width="118" height="36" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="265" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">PII</text>
  <text x="265" y="305" text-anchor="middle" font-size="9" fill="#c7d2fe">SSN &#183; block / anonymize</text>
  <rect x="336" y="276" width="118" height="36" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="395" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Topic</text>
  <text x="395" y="305" text-anchor="middle" font-size="9" fill="#c7d2fe">legal &#183; prescriptions</text>
  <rect x="466" y="276" width="118" height="36" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="525" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Word</text>
  <text x="525" y="305" text-anchor="middle" font-size="9" fill="#c7d2fe">profanity filter</text>
  <line x1="330" y1="326" x2="330" y2="344" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <rect x="115" y="348" width="430" height="42" rx="7" fill="#1d4ed8"/>
  <text x="330" y="366" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">&#9315; Healthcare Agent</text>
  <text x="330" y="382" text-anchor="middle" font-size="10" fill="#93c5fd">Strands + Nova Lite &#183; lookup_symptoms() tool</text>
  <line x1="330" y1="392" x2="330" y2="410" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <rect x="115" y="414" width="430" height="42" rx="7" fill="#6d28d9"/>
  <text x="330" y="432" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">&#9316; Model Evaluation (LLM-as-Judge)</text>
  <text x="330" y="448" text-anchor="middle" font-size="10" fill="#ddd6fe">Claude Sonnet &#183; relevance / accuracy / safety / completeness &#183; 1&#8211;5</text>
  <line x1="330" y1="458" x2="330" y2="476" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <rect x="215" y="480" width="230" height="34" rx="17" fill="#059669"/>
  <text x="330" y="502" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Safe Response</text>

  <text x="330" y="534" text-anchor="middle" font-size="10" fill="#64748b">Kill switch triggers after 3rd violation &#183; inputs 9&#8211;10 rejected without reaching the guardrail</text>
  <text x="330" y="549" text-anchor="middle" font-size="10" fill="#64748b">Output-side scanning is introduced in the exercise</text>
</svg>
