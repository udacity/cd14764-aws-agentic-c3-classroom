<svg viewBox="0 0 720 980" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow8" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow8" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', system-ui, sans-serif; }
      .title { font-size: 18px; font-weight: bold; text-anchor: middle; }
      .subtitle { font-size: 12px; fill: #6b7280; text-anchor: middle; }
      .label { font-size: 13px; text-anchor: middle; }
      .mono { font-family: 'Courier New', monospace; font-size: 10px; }
    </style>
  </defs>

  <!-- White background for dark mode compatibility -->
  <rect width="100%" height="100%" fill="white" rx="8"/>

  <!-- Title -->
  <text x="360" y="30" class="title">Lesson 8: Multi-Agent RAG Architecture</text>
  <text x="360" y="48" class="subtitle">Parallel knowledge base retrieval with synthesis</text>

  <!-- Research Query Input -->
  <rect x="280" y="70" width="160" height="50" rx="25" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow8)"/>
  <text x="360" y="100" class="label" fill="#92400e">Research Query</text>

  <!-- Arrow down -->
  <line x1="360" y1="120" x2="360" y2="155" stroke="#475569" stroke-width="2" marker-end="url(#arrow8)"/>

  <!-- ThreadPoolExecutor Box -->
  <rect x="200" y="155" width="320" height="60" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow8)"/>
  <text x="360" y="180" class="label" fill="#1e40af" font-weight="bold">ThreadPoolExecutor</text>
  <text x="360" y="200" class="label" fill="#1e40af" font-size="11px">Parallel retrieval workers (Nova Lite instances)</text>

  <!-- Arrow down split -->
  <line x1="280" y1="215" x2="160" y2="265" stroke="#475569" stroke-width="2" marker-end="url(#arrow8)"/>
  <line x1="440" y1="215" x2="560" y2="265" stroke="#475569" stroke-width="2" marker-end="url(#arrow8)"/>
  <text x="360" y="240" class="label" fill="#6b7280" font-size="10px">spawn workers</text>

  <!-- CS Retriever -->
  <rect x="60" y="265" width="200" height="95" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow8)"/>
  <text x="160" y="290" class="label" fill="#166534" font-weight="bold">CS Retriever</text>
  <text x="160" y="308" class="label" fill="#166534" font-size="11px">(Nova Lite)</text>
  <line x1="70" y1="318" x2="250" y2="318" stroke="#94a3b8" stroke-width="1"/>
  <text x="160" y="336" class="label" fill="#166534" font-size="10px">Query: "machine learning"</text>
  <text x="160" y="352" class="label" fill="#166534" font-size="10px">Results: [DOC_CS_001, ...]</text>

  <!-- Bio Retriever -->
  <rect x="460" y="265" width="200" height="95" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow8)"/>
  <text x="560" y="290" class="label" fill="#166534" font-weight="bold">Bio Retriever</text>
  <text x="560" y="308" class="label" fill="#166534" font-size="11px">(Nova Lite)</text>
  <line x1="470" y1="318" x2="650" y2="318" stroke="#94a3b8" stroke-width="1"/>
  <text x="560" y="336" class="label" fill="#166534" font-size="10px">Query: "neural biology"</text>
  <text x="560" y="352" class="label" fill="#166534" font-size="10px">Results: [DOC_BIO_042, ...]</text>

  <!-- Arrows down to KBs -->
  <line x1="160" y1="360" x2="160" y2="395" stroke="#475569" stroke-width="2" marker-end="url(#arrow8)"/>
  <line x1="560" y1="360" x2="560" y2="395" stroke="#475569" stroke-width="2" marker-end="url(#arrow8)"/>

  <!-- CS Papers KB -->
  <rect x="60" y="395" width="200" height="65" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" filter="url(#shadow8)"/>
  <text x="160" y="420" class="label" fill="#475569" font-weight="bold">CS Papers KB</text>
  <text x="160" y="440" class="mono" fill="#475569">Embeddings, chunks,</text>
  <text x="160" y="453" class="mono" fill="#475569">metadata indices</text>

  <!-- Bio KB -->
  <rect x="460" y="395" width="200" height="65" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" filter="url(#shadow8)"/>
  <text x="560" y="420" class="label" fill="#475569" font-weight="bold">Biology KB</text>
  <text x="560" y="440" class="mono" fill="#475569">Embeddings, chunks,</text>
  <text x="560" y="453" class="mono" fill="#475569">metadata indices</text>

  <!-- Merge arrows -->
  <line x1="160" y1="460" x2="160" y2="500" stroke="#475569" stroke-width="2"/>
  <line x1="560" y1="460" x2="560" y2="500" stroke="#475569" stroke-width="2"/>
  <line x1="160" y1="500" x2="560" y2="500" stroke="#475569" stroke-width="2"/>
  <text x="360" y="495" class="label" fill="#6b7280" font-size="10px">merge results</text>

  <!-- Arrow down to aggregation -->
  <line x1="360" y1="500" x2="360" y2="535" stroke="#475569" stroke-width="2" marker-end="url(#arrow8)"/>

  <!-- Aggregation Step -->
  <rect x="180" y="535" width="360" height="75" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow8)"/>
  <text x="360" y="560" class="label" fill="#92400e" font-weight="bold">Aggregation</text>
  <text x="360" y="580" class="label" fill="#92400e" font-size="11px">Rank by relevance score, BM25, semantic similarity</text>
  <text x="360" y="597" class="label" fill="#92400e" font-size="11px">Select top-K documents (e.g., top-10)</text>

  <!-- Arrow down -->
  <line x1="360" y1="610" x2="360" y2="650" stroke="#475569" stroke-width="2" marker-end="url(#arrow8)"/>

  <!-- Synthesis Agent -->
  <rect x="180" y="650" width="360" height="80" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow8)"/>
  <text x="360" y="678" class="label" fill="#1e40af" font-weight="bold">Synthesis Agent (Nova Pro)</text>
  <text x="360" y="698" class="label" fill="#1e40af" font-size="11px">Integrate top-K documents, synthesize coherent answer</text>
  <text x="360" y="718" class="label" fill="#1e40af" font-size="11px">Generate response with [DOC_ID] citations</text>

  <!-- Arrow down -->
  <line x1="360" y1="730" x2="360" y2="770" stroke="#475569" stroke-width="2" marker-end="url(#arrow8)"/>

  <!-- Final Output -->
  <rect x="240" y="770" width="240" height="50" rx="25" fill="#fae8ff" stroke="#a855f7" stroke-width="2" filter="url(#shadow8)"/>
  <text x="360" y="800" class="label" fill="#6b21a8">Grounded Research Summary</text>

  <!-- Retrieval Process Info Box -->
  <rect x="30" y="540" width="130" height="90" rx="3" fill="#f9f5ff" stroke="#d8b4fe" stroke-width="1" opacity="0.9"/>
  <text x="40" y="558" font-size="10" fill="#6b21a8" font-weight="bold">Retrieval Process:</text>
  <text x="40" y="575" font-size="9" fill="#6b21a8">1. Query embedding</text>
  <text x="40" y="590" font-size="9" fill="#6b21a8">2. Vector search</text>
  <text x="40" y="605" font-size="9" fill="#6b21a8">3. Chunk filtering</text>
  <text x="40" y="620" font-size="9" fill="#6b21a8">4. Parallel workers</text>

  <!-- Legend -->
  <g>
    <text x="40" y="880" class="subtitle" text-anchor="start" font-weight="bold">Legend:</text>

    <rect x="40" y="895" width="12" height="12" rx="2" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="58" y="905" font-size="11" fill="#64748b">Agents</text>

    <rect x="150" y="895" width="12" height="12" rx="2" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="168" y="905" font-size="11" fill="#64748b">Retrievers</text>

    <rect x="290" y="895" width="12" height="12" rx="2" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="308" y="905" font-size="11" fill="#64748b">Infrastructure</text>

    <rect x="440" y="895" width="12" height="12" rx="2" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="458" y="905" font-size="11" fill="#64748b">Processing</text>

    <rect x="580" y="895" width="12" height="12" rx="2" fill="#fae8ff" stroke="#a855f7"/>
    <text x="598" y="905" font-size="11" fill="#64748b">Output</text>
  </g>
</svg>
